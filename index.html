<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智汇校园  | 赛博登录+吃瓜社区</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
		.modal { z-index: 2000; }
		.cyber-modal { position: relative; z-index: 10; }
		#globalParticlesCanvas {
		    position: fixed;
		    top: 0;
		    left: 0;
		    width: 100%;
		    height: 100%;
		    z-index: 1;
		    pointer-events: none;
		}
		    	/* 我的中心简约白底样式 */
		#myProfileModal .cyber-modal {
		    background: #ffffff !important;
		    color: #1e293b !important;
		    border: 1px solid #e2e8f0 !important;
		    box-shadow: 0 20px 40px rgba(0,0,0,0.08) !important;
		    animation: none !important;
		}
		#myProfileModal .cyber-modal h2 {
		    color: #1e293b !important;
		    text-shadow: none !important;
		}
		#myProfileModal .profile-field label {
		    color: #334155;
		}
		#myProfileModal .profile-field input,
		#myProfileModal .profile-field select,
		#myProfileModal .profile-field textarea {
		    background: #f8fafc;
		    border: 1px solid #cbd5e1;
		    color: #1e293b;
		}
		#myProfileModal .my-tab {
		    border-bottom-color: #e2e8f0;
		}
		#myProfileModal .my-tab span {
		    color: #475569;
		}
		#myProfileModal .my-tab span.active {
		    background: #2c5f8a !important;
		    color: white !important;
		}
		#myProfileModal .record-item {
		    border-bottom-color: #e2e8f0;
		}
		#myProfileModal .btn-sm {
		    background: #2c5f8a;
		}
		#myProfileModal .cyber-btn {
		    background: #2c5f8a;
		    color: white;
		}
		#myProfileModal .modal-close-btn {
		    color: #64748b;
		}
		#myProfileModal .modal-close-btn:hover {
		    color: #ff008c;
		}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7fc; color: #1e293b; line-height: 1.5; padding: 24px 32px; position: relative; }
        .dashboard { max-width: 1600px; margin: 0 auto;  position: relative; z-index: 2; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 32px; background: white; padding: 16px 28px; border-radius: 32px; box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.05); gap: 15px; }
        .logo-area { flex: 0 0 auto; }
        .logo-area h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #1e3c72, #2a5298); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-area p { font-size: 0.85rem; color: #5b6e8c; }
        .search-box { flex: 2; max-width: 400px; margin: 0 auto; background: #e6f0fa; border-radius: 40px; padding: 8px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
        .search-box i { color: #2c5f8a; font-size: 1rem; }
        .search-box span { color: #5b6e8c; font-size: 0.9rem; flex: 1; }
        .search-box:hover { background: #d4e2f0; }
        .user-area { display: flex; align-items: center; gap: 20px; background: #f0f4f9; padding: 8px 20px; border-radius: 40px; flex-wrap: wrap; flex: 0 0 auto; }
        .counter, .online-box, .notification-bell { background: #e6f0fa; border-radius: 30px; padding: 4px 12px; font-size: 0.8rem; font-weight: 500; cursor: pointer; position: relative; }
        .notification-bell .badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        .online-list-popup { position: absolute; top: 40px; right: 0; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 260px; padding: 12px; z-index: 200; display: none; max-height: 300px; overflow-y: auto; }
        .online-box:hover .online-list-popup { display: block; }
        .online-user-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 30px; cursor: pointer; transition: 0.1s; }
        .online-user-item:hover { background: #eef2ff; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .btn-outline-sm { background: transparent; border: 1px solid #2c5f8a; color: #2c5f8a; padding: 5px 12px; border-radius: 30px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .btn-outline-sm:hover { background: #2c5f8a; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 2000; }
        .cyber-modal { position: relative; width: 100%; max-width: 750px; background: rgba(10,10,25,0.95); border: 1px solid #0ff; border-radius: 8px; box-shadow: 0 0 15px #0ff; padding: 30px; backdrop-filter: blur(5px); animation: borderFlicker 3s infinite alternate; color: #fff; max-height: 90vh; overflow-y: auto; }
        @keyframes borderFlicker { 0%{border-color:#0ff;box-shadow:0 0 15px #0ff;} 100%{border-color:#ff008c;box-shadow:0 0 15px #ff008c;} }
        .cyber-modal h2 { text-align: center; margin-bottom: 20px; text-shadow: 0 0 5px #0ff; }
        .cyber-input { width: 100%; padding: 10px; background: rgba(0,0,0,0.6); border: 1px solid #0ff; border-radius: 4px; color: #0ff; margin-bottom: 15px; }
        .cyber-btn { width: 100%; padding: 10px; background: linear-gradient(90deg,#0ff,#ff008c); border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .social-login { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .social-icon { font-size: 32px; cursor: pointer; color: #ccc; }
        .switch-tab { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .switch-tab span { cursor: pointer; padding: 6px 16px; border-radius: 40px; background: rgba(255,255,255,0.1); }
        .active-tab { background: #0ff !important; color: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 28px; margin-bottom: 28px; }
        .card { background: white; border-radius: 28px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); overflow: hidden; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .card-header { padding: 18px 24px 12px; border-bottom: 1px solid #eef2f6; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .card-header i { font-size: 1.6rem; color: #2c5f8a; }
        .card-header h2 { font-size: 1.35rem; font-weight: 600; }
        .card-body { padding: 20px 24px; max-height: 380px; overflow-y: auto; }
        .card-footer { padding: 12px 24px 20px; border-top: 1px solid #eef2f6; background: #fafcff; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #ecf3f9; }
        .tag { background: #eef2ff; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
        .btn-sm { background: #2c5f8a; border: none; color: white; padding: 6px 14px; border-radius: 30px; font-size: 0.7rem; cursor: pointer; }
        .timetable { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .timetable th, .timetable td { border: 1px solid #e2e8f0; padding: 8px 4px; text-align: center; }
        .editable-cell { cursor: pointer; transition: 0.1s; }
        .editable-cell:hover { background: #eef2ff; }
        .post-card { background: #f9fafc; border-radius: 20px; padding: 12px; margin-bottom: 16px; border-left: 4px solid #0ff; cursor: pointer; transition: 0.1s; }
        .post-card:hover { transform: translateX(2px); }
        .post-title { font-weight: bold; display: flex; justify-content: space-between; }
        .post-meta { font-size: 0.7rem; color: gray; margin: 5px 0; }
        .post-meta span.author-name { color: #2c5f8a; font-weight: 500; text-decoration: underline; cursor: pointer; }
        .post-actions i { margin-right: 12px; cursor: pointer; }
        .comment-section { margin-top: 8px; font-size: 0.7rem; background: #fff; padding: 6px; border-radius: 16px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #ccc; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
        .profile-preview { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .profile-field { margin-bottom: 12px; }
        .profile-field label { display: inline-block; width: 70px; }
        .profile-field input, .profile-field select, .profile-field textarea { background: rgba(0,0,0,0.6); border: 1px solid #0ff; border-radius: 20px; padding: 6px 12px; color: #0ff; width: 100%; }
        .my-tab { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #0ff; flex-wrap: wrap; }
        .my-tab span { padding: 8px 16px; cursor: pointer; }
        .my-tab .active { background: #0ff; color: #000; border-radius: 30px; }
        .record-item { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; }
        .new-post-modal .cyber-modal, .edit-profile-modal .cyber-modal { max-width: 700px; }
        textarea, input[type="text"], select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 20px; border: 1px solid #ccc; }
        .image-preview { max-width: 100px; margin: 5px; border-radius: 12px; }
        .secondhand-publish { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .secondhand-publish input { flex: 1; min-width: 100px; }
        .file-label { background: #2c5f8a; padding: 6px 12px; border-radius: 30px; color: white; font-size: 0.7rem; cursor: pointer; display: inline-block; margin: 5px 0; }
        .file-label:hover { background: #1f4668; }
        .random-avatar-btn { background: #ff008c; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; margin-left: 8px; }
        .bio-text { font-size: 0.85rem; color: #aaa; margin-top: 5px; font-style: italic; }
        .reply-item { margin-left: 20px; border-left: 2px solid #0ff; padding-left: 10px; margin-top: 8px; }
        .detail-stats span { margin-right: 20px; cursor: pointer; }
        .user-list-popup { background: #1e1e3a; border-radius: 16px; padding: 10px; max-height: 200px; overflow-y: auto; }
        .notification-list { max-height: 300px; overflow-y: auto; }
        .notification-item { padding: 8px; border-bottom: 1px solid #555; font-size: 0.8rem; }
        .report-btn { font-size: 0.7rem; background: #ff5555; padding: 2px 8px; border-radius: 20px; margin-left: 8px; cursor: pointer; }
        .fullscreen-modal { max-width: 1200px; width: 90%; }
        .community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .community-post-card { background: #1e1e3a; border-radius: 20px; padding: 16px; border-left: 4px solid #0ff; cursor: pointer; transition: 0.1s; }
        .community-post-card:hover { transform: translateY(-2px); background: #2a2a4a; }
        .modal-close-btn { position: absolute; top: 12px; right: 18px; font-size: 1.8rem; color: #0ff; cursor: pointer; z-index: 10; transition: 0.2s; }
        .modal-close-btn:hover { color: #ff008c; transform: scale(1.2); }
        .takeaway-item:hover {
		    background: #f0f4ff;
		    border-radius: 16px;
		    cursor: pointer;
		}
		.order-food-btn {
		    background: #f59e0b;
		    color: white;
		    border: none;
		    font-size: 0.7rem;
		    padding: 4px 10px;
		    border-radius: 20px;
		    cursor: pointer;
		}
		.order-food-btn:hover {
		    background: #d97706;
		}
		.cyber-modal {
		    position: relative;
		    z-index: 10;
		}
		#globalParticlesCanvas {
		    z-index: 1;          
		}
				/* ========== 手机端适配 ========== */
		@media (max-width: 768px) {
		    body {
		        padding: 12px 8px;
		    }
		
		    .header {
		        flex-direction: column;
		        align-items: stretch;
		        padding: 12px 16px;
		        border-radius: 20px;
		        gap: 10px;
		    }
		
		    .logo-area h1 {
		        font-size: 1.3rem;
		    }
		
		    .search-box {
		        max-width: 100%;
		        margin: 0;
		    }
		
		    .user-area {
		        justify-content: center;
		        flex-wrap: wrap;
		        gap: 8px;
		    }
		
		    .grid {
		        grid-template-columns: 1fr; /* 所有卡片全部单列 */
		        gap: 16px;
		    }
		
		    .card {
		        border-radius: 20px;
		    }
		
		    .card-body {
		        max-height: 250px;
		    }
		
		    .card-header h2 {
		        font-size: 1.1rem;
		    }
		
		    .card-footer {
		        padding: 10px 16px;
		    }
		
		    .post-card {
		        padding: 10px;
		    }
		
		    /* 表单项适配 */
		    .secondhand-publish input,
		    .card-footer input[type="text"],
		    .card-footer select {
		        min-width: 100%;
		        margin-bottom: 8px;
		    }
		
		    /* 课表横向滚动 */
		    .timetable {
		        font-size: 0.65rem;
		    }
		    .timetable th, .timetable td {
		        padding: 4px 2px;
		    }
		
		    /* 弹窗全屏+圆角移除 */
		    .cyber-modal {
		        max-width: 100% !important;
		        width: 100% !important;
		        height: 100vh;
		        border-radius: 0 !important;
		        padding: 20px 15px;
		        margin: 0;
		        overflow-y: auto;
		    }
		    .modal {
		        padding: 0;
		    }
		    .fullscreen-modal {
		        width: 100% !important;
		    }
		
		    /* 按钮文字缩小 */
		    .btn-sm {
		        font-size: 0.65rem;
		        padding: 4px 10px;
		    }
		
		    /* 在线列表弹窗位置修正 */
		    .online-list-popup {
		        width: 260px;
		        right: -20px;
		    }
		
		    /* 外卖/快递/活动列表项竖向排列 */
		    .list-item {
		        flex-direction: column;
		        align-items: flex-start;
		        gap: 8px;
		    }
		    .list-item > div:last-child {
		        align-self: flex-end;
		    }
		
		    /* 外卖图片适当缩小 */
		    .takeaway-item img {
		        width: 60px;
		        height: 60px;
		    }
		
		    /* 粒子画布优化（避免耗电） */
		    #globalParticlesCanvas {
		        opacity: 0.7;
		    }
		}
    </style>
</head>
<body>
	<canvas id="globalParticlesCanvas"></canvas>
<div id="particles-cyber" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:999; pointer-events:none; display:none;"></div>
<div class="dashboard">
    <div class="header">
        <div class="logo-area"><h1><i class="fas fa-graduation-cap"></i> 智汇校园 · 跨校平台</h1><p>多校融合 | 吃瓜社区 | 智慧服务</p></div>
        <div class="search-box" id="globalSearchBtn"><i class="fas fa-search"></i><span>搜索帖子、用户...</span></div>
        <div class="user-area">
            <div class="counter"><i class="fas fa-eye"></i> 访问: <span id="visitCount">0</span></div>
            <div class="online-box"><i class="fas fa-users"></i> 在线: <span id="onlineCount">0</span><div class="online-list-popup" id="onlineListPopup"><div id="onlineUserList">加载中...</div></div></div>
            <div class="notification-bell" id="notificationBell"><i class="fas fa-bell"></i><span id="notificationBadge" class="badge" style="display:none;">0</span><div class="online-list-popup" id="notificationPopup" style="width:300px; right:auto; left:0;"><div id="notificationList" class="notification-list">暂无通知</div></div></div>
            <div id="authDisplay" class="user-info"><i class="fas fa-user-circle"></i><span id="usernameDisplay">游客模式</span><button id="loginBtn" class="btn-outline-sm">登录/注册</button><button id="myProfileBtn" class="btn-outline-sm" style="display:none;"><i class="fas fa-user"></i> 我的</button></div>
        </div>
    </div>
    <div id="dynamicContent"></div>
</div>

<!-- 赛博登录模态框 -->
<div id="authModal" class="modal"><div class="cyber-modal"><h2><i class="fas fa-skull"></i> 霓虹登录</h2><div class="switch-tab"><span id="tabLogin" class="active-tab">账号登录</span><span id="tabRegister">注册</span></div><div id="loginForm"><input type="text" id="loginPhone" class="cyber-input" placeholder="11位手机号" maxlength="11"><input type="password" id="loginPassword" class="cyber-input" placeholder="密码"><button id="doLogin" class="cyber-btn">登录</button></div><div id="registerForm" style="display:none;"><input type="text" id="regPhone" class="cyber-input" placeholder="11位手机号" maxlength="11"><input type="password" id="regPassword" class="cyber-input" placeholder="密码">
<div style="position: relative;">
    <input type="text" id="regSchoolSearch" class="cyber-input" placeholder="输入学校关键词搜索（如'贵州'、'清华'）" autocomplete="off" style="margin-bottom:0;">
    <div id="regSchoolDropdown" style="display:none; position: absolute; top: 100%; left: 0; width: 100%; max-height: 200px; overflow-y: auto; background: #1a1a2e; border: 1px solid #0ff; border-radius: 4px; z-index: 9999;"></div>
    <input type="hidden" id="regSchool" value="">
</div>
<button id="doRegister" class="cyber-btn">立即注册</button></div><div class="social-login"><i class="fab fa-weixin social-icon" id="wechatLogin"></i><i class="fab fa-qq social-icon" id="qqLogin"></i></div><button id="closeModal" class="cyber-btn" style="background:#333;">关闭</button></div></div>

<!-- 搜索模态框 -->
<div id="searchModal" class="modal"><div class="cyber-modal"><h2><i class="fas fa-search"></i> 全局搜索</h2><input type="text" id="searchKeyword" class="cyber-input" placeholder="搜索帖子标题/内容或用户昵称/手机号"><button id="doSearch" class="cyber-btn">搜索</button><div id="searchResults" style="margin-top:20px; max-height:400px; overflow-y:auto;"></div><button id="closeSearchModal" class="cyber-btn" style="background:#333;">关闭</button></div></div>

<!-- 帖子详情模态框 -->
<div id="postDetailModal" class="modal"><div class="cyber-modal" style="max-width:800px;"><div id="postDetailContent"></div><button id="closeDetailModal" class="cyber-btn" style="background:#333; margin-top:20px;">关闭</button></div></div>

<!-- 独立的吃瓜社区广场模态框 -->
<div id="communityModal" class="modal"><div class="cyber-modal fullscreen-modal" style="max-width: 1200px; width: 90%;"><h2><i class="fas fa-newspaper"></i> 🍉 吃瓜社区广场 · 热门榜</h2><div id="communityPostsContainer" style="max-height: 70vh; overflow-y: auto; margin-top: 20px;"></div><button id="closeCommunityModal" class="cyber-btn" style="background:#333; margin-top:20px;">关闭</button></div></div>

<!-- 我的个人中心模态框 -->
<div id="myProfileModal" class="modal"><div class="cyber-modal edit-profile-modal" style="max-width:600px;"><h2><i class="fas fa-id-card"></i> 我的中心</h2><div class="profile-preview"><img id="myAvatar" class="avatar" src="https://randomuser.me/api/portraits/lego/1.jpg"><div><button id="randomAvatarBtn" class="random-avatar-btn">随机头像</button><button id="uploadAvatarBtn" class="file-label" style="margin-left:5px;">上传头像</button><input type="file" id="avatarFileInput" accept="image/*" style="display:none;"></div></div><div class="profile-field"><label>我的ID:</label><input type="text" id="myUserIdDisplay" readonly style="background:rgba(0,0,0,0.6); border:1px solid #0ff; color:#0ff; width:100%;"></div><div class="profile-field"><label>昵称:</label><input type="text" id="editNickname" placeholder="昵称"></div><div class="profile-field"><label>性别:</label><select id="editGender"><option>男</option><option>女</option><option>保密</option></select></div><div class="profile-field"><label>个性签名:</label><textarea id="editBio" rows="2" placeholder="写点什么吧..."></textarea></div><button id="saveProfileBtn" class="cyber-btn" style="margin-top:10px;">保存修改</button><div class="my-tab"><span id="tabViewHistory" class="active">浏览记录</span><span id="tabPostHistory">我的发布</span><span id="tabInteractHistory">评论/点赞</span><span id="tabCollectionHistory">我的收藏</span><span id="tabNotifications">通知中心</span></div><div id="historyContent" style="max-height:300px; overflow-y:auto;"></div><button id="closeProfileModal" class="cyber-btn" style="margin-top:20px;">关闭</button></div></div>

<!-- 他人主页模态框 -->
<div id="otherProfileModal" class="modal"><div class="cyber-modal" style="max-width:600px;"><h2><i class="fas fa-user-friends"></i> 用户主页</h2><div id="otherProfileContent"></div><button id="closeOtherModal" class="cyber-btn" style="margin-top:20px;">关闭</button></div></div>

<!-- 发布新瓜全屏界面 -->

	function isFollowing(followerPhone, targetPhone) {
	    return userFollows[followerPhone] && userFollows[followerPhone].includes(targetPhone);

	function toggleFollow(followerPhone, targetPhone) {
	    if (!userFollows[followerPhone]) userFollows[followerPhone] = [];
	    const idx = userFollows[followerPhone].indexOf(targetPhone);
	    if (idx === -1) {
	        userFollows[followerPhone].push(targetPhone);
	        addNotification(targetPhone, `${userProfiles[followerPhone]?.nickname || followerPhone} 关注了你`);
	    } else {
	        userFollows[followerPhone].splice(idx, 1);
	    }
	    saveFollows();
	}

	    privateMessages[fromPhone].push(msg);

	    saveMessages();
	    addNotification(toPhone, `你收到来自 ${userProfiles[fromPhone]?.nickname || fromPhone} 的私信：${content}`);

    function sortPosts(posts){
        let now = Date.now();
        let top = posts.filter(p=>p.isTop);
        let recent = posts.filter(p=>!p.isTop && (now - (p.timestamp || 0) < 600000));
        let other = posts.filter(p=>!p.isTop && !(now - (p.timestamp || 0) < 600000));
        recent.sort((a,b)=> (b.timestamp||0) - (a.timestamp||0));
        other.sort((a,b)=> b.viewCount - a.viewCount);
        return [...top, ...recent, ...other];
    }

    function recordAction(type, targetId, extra={}){ if(!currentUser) return; let key = currentUser.phone; if(!userActions[key]) userActions[key] = { views:[], posts:[], comments:[], likes:[], collections:[] }; if(type==='view') userActions[key].views.unshift({ postId:targetId, time:new Date().toISOString(), title:globalPosts.find(p=>p.id==targetId)?.title }); if(type==='like') userActions[key].likes.unshift({ postId:targetId, time:new Date().toISOString() }); if(type==='comment') userActions[key].comments.unshift({ postId:targetId, content:extra.content, time:new Date().toISOString() }); if(type==='publish') userActions[key].posts.unshift({ postId:targetId, time:new Date().toISOString() }); if(type==='collect') userActions[key].collections.unshift({ postId:targetId, time:new Date().toISOString() }); localStorage.setItem("userActions", JSON.stringify(userActions)); }

        document.getElementById("editPostBtn")?.addEventListener("click",()=>{ let newTitle = prompt("新标题",post.title); let newContent = prompt("新内容",post.content); if(newTitle) post.title=newTitle; if(newContent) post.content=newContent; savePosts(); showPostDetail(post.id); renderAll(); });

<script>
// 全局粒子特效（确保在 DOM 加载后执行）
(function() {
    function initParticles() {
        const canvas = document.getElementById("globalParticlesCanvas");
        if (!canvas) {
            console.warn("Canvas not found");
            return;
        }
        const ctx = canvas.getContext("2d");
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 30;
        let mouse = { x: null, y: null, radius: 120 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener("resize", resize);
        resize();

        window.addEventListener("mousemove", function(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener("mouseout", function() {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.radius = Math.random() * 3 + 1.5;
                this.color = `hsl(${Math.random() * 60 + 180}, 80%, 65%)`;
            }
            update() {
                if (mouse.x && mouse.y) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        let force = (mouse.radius - dist) / mouse.radius * 0.03;
                        this.vx += dx * force;
                        this.vy += dy * force;
                    }
                }
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            // 连线
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 70) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(100, 200, 255, ${0.08 * (1 - dist / 90)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    }

    // 确保 DOM 就绪
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initParticles);
    } else {
        initParticles();
    }
})();
</script>
